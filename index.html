<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1a0a00">
  <title>除夜の鐘チャレンジ</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- スタート画面 -->
  <div id="screen-start" class="screen active">
    <div class="start-inner">
      <h1 class="game-title">除夜の鐘<br><span>チャレンジ</span></h1>
      <p class="game-subtitle">108の煩悩を退散させよ</p>
      <div class="rules">
        <h2>遊び方</h2>
        <ul>
          <li>鐘が中央付近にあるときに叩くと高得点！</li>
          <li>連続でいいタイミングを狙うとコンボボーナス</li>
          <li>108回叩いて煩悩を全て退散させよう</li>
        </ul>
        <div class="timing-legend">
          <span class="legend-perfect">PERFECT ±3°</span>
          <span class="legend-great">GREAT ±8°</span>
          <span class="legend-good">GOOD ±15°</span>
          <span class="legend-miss">MISS それ以外</span>
        </div>
      </div>
      <button id="btn-start" class="btn-primary">ゲームスタート</button>
      <div id="start-highscore" class="highscore-display"></div>
    </div>
  </div>

  <!-- ゲーム画面 -->
  <div id="screen-game" class="screen">
    <header class="game-header">
      <div class="stat-block">
        <span class="stat-label">スコア</span>
        <span id="score-display" class="stat-value">0</span>
      </div>
      <div class="stat-block">
        <span class="stat-label">コンボ</span>
        <span id="combo-display" class="stat-value">0</span>
      </div>
      <div class="stat-block">
        <span class="stat-label">最高</span>
        <span id="highscore-display" class="stat-value">0</span>
      </div>
    </header>

    <div class="bonno-name" id="bonno-name">煩悩を退散させよ</div>
    <div class="bonno-count">
      残り煩悩: <span id="bonno-remaining">108</span> / 108
    </div>

    <div class="bell-area">
      <div id="bell-wrapper" class="bell-wrapper">
        <img src="img/joyanokane.png" alt="除夜の鐘" id="bell-img" class="bell-img">
      </div>
      <div id="judgment-text" class="judgment-text"></div>
    </div>

    <div class="timing-bar-container">
      <div class="timing-bar">
        <div class="zone zone-miss left-miss">MISS</div>
        <div class="zone zone-good left-good">GOOD</div>
        <div class="zone zone-great left-great">GREAT</div>
        <div class="zone zone-perfect">PERF</div>
        <div class="zone zone-great right-great">GREAT</div>
        <div class="zone zone-good right-good">GOOD</div>
        <div class="zone zone-miss right-miss">MISS</div>
      </div>
      <div id="timing-pointer" class="timing-pointer">▼</div>
    </div>

    <button id="btn-hit" class="btn-hit" aria-label="鐘を叩く">BANG!</button>
  </div>

  <!-- リザルト画面 -->
  <div id="screen-result" class="screen">
    <div class="result-inner">
      <h2 class="result-title">煩悩退散！</h2>
      <div id="result-rank" class="result-rank">S</div>
      <div class="result-stats">
        <div class="result-stat">
          <span class="result-stat-label">スコア</span>
          <span id="result-score" class="result-stat-value">0</span>
        </div>
        <div class="result-stat">
          <span class="result-stat-label">最大コンボ</span>
          <span id="result-max-combo" class="result-stat-value">0</span>
        </div>
        <div class="result-stat">
          <span class="result-stat-label">PERFECT</span>
          <span id="result-perfect" class="result-stat-value">0</span>
        </div>
        <div class="result-stat">
          <span class="result-stat-label">GREAT</span>
          <span id="result-great" class="result-stat-value">0</span>
        </div>
        <div class="result-stat">
          <span class="result-stat-label">GOOD</span>
          <span id="result-good" class="result-stat-value">0</span>
        </div>
        <div class="result-stat">
          <span class="result-stat-label">MISS</span>
          <span id="result-miss" class="result-stat-value">0</span>
        </div>
      </div>
      <div id="result-strongest-bonno" class="result-strongest"></div>
      <div id="new-record" class="new-record hidden">🎊 NEW RECORD!</div>
      <div id="result-highscore" class="result-highscore"></div>
      <div class="result-buttons">
        <button id="btn-share" class="btn-share">結果をシェア</button>
        <button id="btn-replay" class="btn-primary">もう一度</button>
      </div>
    </div>
  </div>

  <script src="js/main.js"></script>
</body>
</html>
